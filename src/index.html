<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fixture SA</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <!-- ================================
       LAYOUT 1: Fixture SA (A B C D E)
  ================================= -->
  <div class="browser">
    <div class="browser-chrome">Chrome</div>
    <div class="browser-bar">
      <div class="browser-arrows">
        <span>&#8592;</span>
        <span>&#8594;</span>
        <span>&#8635;</span>
      </div>
      <div class="browser-url">http://www.fixturesa.com</div>
    </div>
    <div class="contenedor-principal">
      <header class="header">Fixture SA</header>
      <div class="fila-superior">
        <section class="seccion A">A</section>
        <section class="seccion B">B</section>
      </div>
      <div class="fila-inferior">
        <section class="seccion C">C</section>
        <section class="seccion D">D</section>
        <section class="seccion E">E</section>
      </div>
    </div>
  </div>

  <!-- ================================
       LAYOUT 2: header/nav/article/aside/footer
  ================================= -->
  <div class="layout2-wrapper">
  <div class="layout2">
    <header class="l2-header">header</header>
    <nav class="l2-nav">nav</nav>
    <article class="l2-article">article</article>
    <aside class="l2-aside">aside</aside>
    <footer class="l2-footer">footer</footer>
  </div>
  </div>

</body>
</html>
